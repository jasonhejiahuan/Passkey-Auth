<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="management-csrf-token" content="{{ csrf_token }}">
    <title>Passkey Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='management.css') }}">
    <script defer src="{{ url_for('static', filename='management.js') }}"></script>
  </head>
  <body>
    <div class="management-shell">
      <aside class="sidebar">
        <div class="brand">
          <picture>
            <source
              srcset="{{ url_for('static', filename='brand/jason-logo-white.png') }}"
              media="(prefers-color-scheme: dark)"
            >
            <img
              src="{{ url_for('static', filename='brand/jason-logo-black.png') }}"
              alt="Jason"
            >
          </picture>
          <span>Passkey Management</span>
        </div>
        <nav aria-label="管理区域">
          <button class="nav-item is-active" data-view="users">用户</button>
          <button class="nav-item" data-view="platforms">平台</button>
          <button class="nav-item" data-view="login-history">登录历史</button>
          <button class="nav-item" data-view="audit-logs">审计日志</button>
          <button class="nav-item" data-view="settings">设置</button>
          <button class="nav-item" data-view="passkey-settings">Passkey 高级设置</button>
        </nav>
        <div class="sidebar-actions">
          <button id="refresh-button" class="quiet-button">刷新数据</button>
          <button id="logout-button" class="logout-button">退出登录</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="workspace-header">
          <div>
            <p class="eyebrow">Passkey-Auth</p>
            <h1 id="view-title">用户</h1>
          </div>
          <output id="management-status" role="status" aria-live="polite" hidden></output>
        </header>

        <section id="users-view" class="view is-active">
          <div class="toolbar">
            <input id="user-search" type="search" placeholder="搜索用户名或 sub">
            <a class="button-link" href="/api/management/export/users.csv">导出 CSV</a>
          </div>
          <div id="users-list" class="data-list"></div>
        </section>

        <section id="platforms-view" class="view">
          <div class="toolbar">
            <button id="new-platform-button" class="primary-button">新建平台</button>
            <a class="button-link" href="/api/management/export/platforms.csv">导出 CSV</a>
          </div>
          <div id="platforms-list" class="data-list"></div>
        </section>

        <section id="login-history-view" class="view">
          <div class="toolbar">
            <a class="button-link" href="/api/management/export/login-history.csv">导出 CSV</a>
            <button class="danger-button" data-clear-log="login">清理登录历史</button>
          </div>
          <div id="login-history-list" class="data-list"></div>
        </section>

        <section id="audit-logs-view" class="view">
          <div class="toolbar">
            <a class="button-link" href="/api/management/export/audit-logs.csv">导出 CSV</a>
            <button class="danger-button" data-clear-log="audit">清理审计日志</button>
          </div>
          <div id="audit-logs-list" class="data-list"></div>
        </section>

        <section id="settings-view" class="view">
          <form id="registration-settings" class="settings-card">
            <div>
              <p class="eyebrow">注册</p>
              <h2>注册入口</h2>
              <p class="muted">更改后自动保存。</p>
            </div>
            <label>
              状态
              <select name="mode">
                <option value="closed">关闭</option>
                <option value="open">永久开放</option>
                <option value="temporary">临时开放</option>
              </select>
            </label>
            <label>
              临时开放至
              <input name="enabledUntil" type="datetime-local">
            </label>
            <label class="toggle-row">
              <input name="defaultDemoAllowed" type="checkbox">
              <span class="toggle-control" aria-hidden="true"></span>
              <span>新用户默认允许使用内置示例</span>
            </label>
          </form>
        </section>

        <section id="passkey-settings-view" class="view">
          <form id="passkey-settings" class="settings-card settings-card-wide">
            <div>
              <p class="eyebrow">WebAuthn</p>
              <h2>Passkey 高级设置</h2>
              <p class="muted">更改后自动保存，并影响之后创建和验证的 Passkey；不会改写已有凭据。</p>
            </div>

            <label>
              公钥签名算法预设
              <select name="algorithmPreset">
                <option value="recommended">推荐兼容（ES256、EdDSA、RS256）</option>
                <option value="modern">现代设备（ES256、EdDSA）</option>
                <option value="maximum">最大兼容（全部安全算法）</option>
                <option value="custom">自定义</option>
              </select>
            </label>
            <fieldset>
              <legend>启用的公钥签名算法</legend>
              <div class="option-grid">
                <label class="switch-row"><input type="checkbox" name="algorithm" value="-7"><span>ES256 · 推荐</span></label>
                <label class="switch-row"><input type="checkbox" name="algorithm" value="-8"><span>EdDSA</span></label>
                <label class="switch-row"><input type="checkbox" name="algorithm" value="-257"><span>RS256 · 兼容</span></label>
                <label class="switch-row"><input type="checkbox" name="algorithm" value="-36"><span>ES512</span></label>
                <label class="switch-row"><input type="checkbox" name="algorithm" value="-37"><span>PS256</span></label>
                <label class="switch-row"><input type="checkbox" name="algorithm" value="-38"><span>PS384</span></label>
                <label class="switch-row"><input type="checkbox" name="algorithm" value="-39"><span>PS512</span></label>
                <label class="switch-row"><input type="checkbox" name="algorithm" value="-258"><span>RS384</span></label>
                <label class="switch-row"><input type="checkbox" name="algorithm" value="-259"><span>RS512</span></label>
              </div>
            </fieldset>

            <div class="settings-grid">
              <label>
                认证器类型
                <select name="authenticatorAttachment">
                  <option value="any">不限（推荐）</option>
                  <option value="platform">仅本机认证器</option>
                  <option value="cross-platform">仅安全密钥</option>
                </select>
              </label>
              <label>
                Resident Key
                <select name="residentKey">
                  <option value="required">必须 · 支持无用户名登录</option>
                  <option value="preferred">优先</option>
                  <option value="discouraged">不建议使用</option>
                </select>
              </label>
              <label>
                用户验证
                <select name="userVerification">
                  <option value="preferred">优先（推荐）</option>
                  <option value="required">必须验证指纹、面容或 PIN</option>
                  <option value="discouraged">仅确认用户在场</option>
                </select>
              </label>
              <label>
                Attestation
                <select name="attestation">
                  <option value="none">不请求（推荐）</option>
                  <option value="indirect">间接证明</option>
                  <option value="direct">直接证明</option>
                  <option value="enterprise">企业证明</option>
                </select>
              </label>
              <label>
                浏览器认证器提示
                <select name="hintPreset">
                  <option value="all">本机优先，允许安全密钥和跨设备</option>
                  <option value="client-device">优先本机 Passkey</option>
                  <option value="security-key">优先安全密钥</option>
                  <option value="hybrid">优先手机跨设备认证</option>
                  <option value="none">不提供提示</option>
                </select>
              </label>
            </div>

            <label class="toggle-row">
              <input name="excludeCredentials" type="checkbox">
              <span class="toggle-control" aria-hidden="true"></span>
              <span>注册时排除账户已有凭据，避免重复注册</span>
            </label>
          </form>
        </section>
      </main>
    </div>

    <dialog id="editor-dialog">
      <form id="editor-form" method="dialog">
        <header>
          <h2 id="editor-title">编辑</h2>
          <button class="icon-button" value="cancel" aria-label="关闭">关闭</button>
        </header>
        <div id="editor-content"></div>
      </form>
    </dialog>

  </body>
</html>
